<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>YASA — Stock Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --navy:    #0f172a;
  --navy2:   #1e293b;
  --navy3:   #334155;
  --accent:  #2563eb;
  --accent2: #1d4ed8;
  --gold:    #f59e0b;
  --text:    #f1f5f9;
  --text2:   #94a3b8;
  --text3:   #64748b;
  --border:  #1e293b;
  --border2: #334155;
  --green:   #059669;
  --red:     #dc2626;
  --orange:  #ea580c;
  --card:    #1e293b;
  --input:   #0f172a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--navy); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

/* ── TOPNAV ── */
.topnav {
  background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.topnav-logo { width: 36px; height: 36px; background: rgba(255,255,255,.15); border-radius: 8px; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:18px; color:#fff; }
.topnav-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.5px; color:#fff; line-height:1.2; }
.topnav-sub { font-size:10px; opacity:.65; letter-spacing:.8px; text-transform:uppercase; }

/* ── MODULE TABS ── */
.mod-tabs { display:flex; background:var(--navy2); border-bottom:2px solid var(--border2); overflow-x:auto; }
.mod-tab { padding:12px 20px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--text3); cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent; transition:all .15s; }
.mod-tab:hover { color:var(--text2); }
.mod-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── CONTENT ── */
.content { padding: 20px; max-width: 900px; margin: 0 auto; }

/* ── CARDS ── */
.card { background:var(--card); border:1px solid var(--border2); border-radius:12px; padding:18px; margin-bottom:16px; }
.card-title { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--text2); margin-bottom:14px; display:flex; align-items:center; gap:8px; }

/* ── SCAN BUTTON ── */
.scan-btn {
  width:100%; padding:18px; background:var(--accent); color:#fff; border:none; border-radius:10px;
  font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:.5px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
  transition:background .15s; margin-bottom:16px;
}
.scan-btn:hover { background:var(--accent2); }
.scan-btn:active { transform:scale(.98); }

/* ── QR READER ── */
#qr-reader-wrap { display:none; border-radius:10px; overflow:hidden; margin-bottom:16px; position:relative; }
#qr-reader { width:100%; }
.stop-scan-btn {
  width:100%; padding:12px; background:var(--red); color:#fff; border:none; border-radius:8px;
  font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; cursor:pointer; margin-top:8px;
}

/* ── FILTER BAR ── */
.filter-bar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.filter-bar select, .filter-bar input {
  background:var(--input); border:1px solid var(--border2); color:var(--text); border-radius:7px;
  padding:8px 12px; font-size:13px; font-family:'Barlow Condensed',sans-serif; outline:none; flex:1; min-width:140px;
}

/* ── DEVICE LIST ── */
.device-item {
  background:var(--navy); border:1px solid var(--border2); border-radius:8px; padding:12px 14px;
  margin-bottom:8px; cursor:pointer; transition:border-color .15s;
}
.device-item:hover { border-color:var(--accent); }
.device-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.device-barcode { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:var(--text); }
.device-location { font-size:11px; padding:2px 8px; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-weight:700; }
.loc-vessel { background:rgba(37,99,235,.15); color:#60a5fa; border:1px solid rgba(37,99,235,.25); }
.loc-egemar { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.25); }
.device-date { font-size:11px; color:var(--text3); margin-left:auto; }
.device-desc { font-size:12px; color:var(--text2); }
.device-history-wrap { display:none; margin-top:10px; padding-top:10px; border-top:1px solid var(--border2); }
.device-history-wrap.open { display:block; }
.history-item { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border); font-size:12px; }
.history-item:last-child { border-bottom:none; }
.hist-arrow { color:var(--text3); }
.hist-date { color:var(--text3); font-family:'JetBrains Mono',monospace; font-size:10px; }

/* ── MODAL ── */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:500; align-items:center; justify-content:center; padding:20px; }
.modal-bg.open { display:flex; }
.modal { background:var(--navy2); border:1px solid var(--border2); border-radius:14px; padding:24px; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; }
.modal-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; color:var(--text); margin-bottom:6px; }
.modal-barcode { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); margin-bottom:16px; padding:8px 10px; background:var(--navy); border-radius:6px; word-break:break-all; }
.modal-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text3); margin-bottom:5px; margin-top:12px; }
.modal select, .modal input[type=text] {
  width:100%; background:var(--input); border:1px solid var(--border2); color:var(--text); border-radius:7px;
  padding:10px 12px; font-size:14px; font-family:'Barlow',sans-serif; outline:none;
}
.modal-actions { display:flex; gap:8px; margin-top:18px; }
.btn-primary { flex:1; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
.btn-cancel  { flex:1; padding:12px; background:transparent; color:var(--text2); border:1px solid var(--border2); border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
.btn-primary:hover { background:var(--accent2); }

/* ── TOAST ── */
.toast { position:fixed; bottom:24px; right:20px; background:#059669; color:#fff; padding:12px 18px; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600; box-shadow:0 4px 20px rgba(0,0,0,.3); z-index:900; display:none; max-width:320px; }
.toast.error { background:var(--red); }

/* ── STATS ── */
.stats-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
.stat-box { flex:1; min-width:100px; background:var(--navy); border:1px solid var(--border2); border-radius:10px; padding:12px 14px; text-align:center; }
.stat-num { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; color:var(--accent); }
.stat-lbl { font-size:10px; font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text3); margin-top:2px; }

/* ── EMPTY ── */
.empty { text-align:center; padding:50px 20px; color:var(--text3); }
.empty-icon { font-size:48px; opacity:.2; margin-bottom:12px; }
.empty-text { font-family:'Barlow Condensed',sans-serif; font-size:16px; }

/* ── PAGE VISIBILITY ── */
.page { display:none; }
.page.active { display:block; }
</style>
</head>
<body>

<!-- TOPNAV -->
<div class="topnav">
  <div class="topnav-logo">Y</div>
  <div class="topnav-title">
    YASA SHIPPING
    <div class="topnav-sub">Stock Tracking</div>
  </div>
</div>

<!-- MODULE TABS -->
<div class="mod-tabs">
  <div class="mod-tab active" onclick="switchPage('gas',this)">🔍 Gas Detector Stock</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- GAS DETECTOR PAGE -->
<div class="page active" id="page-gas">
<div class="content">

  <!-- SCAN -->
  <div class="card">
    <div class="card-title">📷 Data Matrix / QR Tara</div>
    <button class="scan-btn" onclick="startScan()">
      <span style="font-size:22px;">📱</span> Data Matrix / QR Okut
    </button>
    <div id="qr-reader-wrap">
      <div id="qr-reader"></div>
      <div style="text-align:center;padding:6px;font-size:11px;color:var(--text3);">Data Matrix · QR · Code128 · EAN desteklenir</div>
      <button class="stop-scan-btn" onclick="stopScan()">✕ Taramayı Durdur</button>
    </div>
    <!-- Manuel QR girişi -->
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="text" id="manualBarcode" placeholder="Kodu manuel gir..." style="flex:1;background:var(--input);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;">
      <button onclick="manualAdd()" style="padding:9px 16px;background:var(--navy3);color:var(--text);border:1px solid var(--border2);border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Ekle</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- FILTER -->
  <div class="card">
    <div class="card-title">📋 Cihaz Listesi</div>
    <div class="filter-bar">
      <select id="filterLocation" onchange="renderList()">
        <option value="">Tüm Lokasyonlar</option>
        <option value="EGEMAR CALİBRATION">⚙ Egemar Calibration</option>
      </select>
      <input type="text" id="filterSearch" placeholder="🔍 Kod ara..." oninput="renderList()">
    </div>
    <div id="deviceList"></div>
  </div>

</div>
</div>

<!-- LOCATION MODAL -->
<div class="modal-bg" id="locationModal">
  <div class="modal">
    <div class="modal-title">📍 Lokasyon Seç</div>
    <div class="modal-barcode" id="modalBarcode"></div>

    <div class="modal-label">Cihaz Tanımı (opsiyonel)</div>
    <input type="text" id="modalDesc" placeholder="Model, seri no, açıklama...">

    <div class="modal-label">Gidecek Lokasyon</div>
    <select id="modalLocation">
      <option value="EGEMAR CALİBRATION">⚙ Egemar Calibration</option>
    </select>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn-primary" onclick="saveDevice()">💾 Kaydet</button>
    </div>
  </div>
</div>

<script>
// ── VESSELS ──────────────────────────────────────────────────────
const VESSELS = [
  'YASA H.MULLA','YASA ROSE','YASA KYOTO','YASA MOON','YASA ILHAN',
  'YASA MARS','YASA KAPTAN ERBIL','YASA LOTUS','YASA EMERALD','YASA STAR',
  'YASA FALCON','YASA OSAKA','YASA CANARY','YASA VENUS','YASA CAMELLIA',
  'YASA SPRING','YASA PEARL','YASA URANUS','YASA BEGONIA',
  'YASA H.MEHMET','YASA TOKYO','YASA JASMINE','YASA SUN',
  'YASA JUPITER','YASA EAGLE','YASA TULIP','YASA RUBY','YASA PLUTO',
  'YASA UNSAL SUNAR','YASA SPARROW','YASA SAPPHIRE','YASA SATURN','YASA MAGNOLIA',
  'YASA NEPTUNE','YASA DREAM','YASA MIMOSA','YASA DIAMOND','YASA EMIRHAN'
];

const STORAGE_KEY = 'yasa_gas_detectors';

let html5QrCode = null;
let pendingBarcode = null;

// ── INIT ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Populate vessel dropdowns
  const locSel = document.getElementById('modalLocation');
  const filSel = document.getElementById('filterLocation');
  VESSELS.forEach(v => {
    const o1 = document.createElement('option'); o1.value = v; o1.textContent = '⚓ ' + v;
    locSel.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = v; o2.textContent = '⚓ ' + v;
    filSel.appendChild(o2);
  });
  renderStats();
  renderList();
});

// ── PAGE SWITCH ───────────────────────────────────────────────────
function switchPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mod-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id)?.classList.add('active');
  if (el) el.classList.add('active');
}

// ── DATA ──────────────────────────────────────────────────────────
function loadDevices() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}
function saveDevices(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// ── SCAN ──────────────────────────────────────────────────────────
function startScan() {
  const wrap = document.getElementById('qr-reader-wrap');
  wrap.style.display = 'block';

  html5QrCode = new Html5Qrcode('qr-reader');
  Html5Qrcode.getCameras().then(cameras => {
    if (!cameras.length) { showToast('Kamera bulunamadı', true); return; }
    // Prefer back camera
    const cam = cameras.find(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('arka')) || cameras[cameras.length - 1];
    const formats = [
      Html5QrcodeSupportedFormats.DATA_MATRIX,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
    ];
    html5QrCode.start(
      cam.id,
      {
        fps: 15,
        qrbox: { width: 280, height: 280 },
        formatsToSupport: formats,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      },
      (decodedText) => {
        stopScan();
        openModal(decodedText.trim());
      },
      (err) => {}
    ).catch(err => showToast('Kamera hatası: ' + err, true));
  }).catch(() => showToast('Kamera erişimi reddedildi', true));
}

function stopScan() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
  document.getElementById('qr-reader-wrap').style.display = 'none';
}

function manualAdd() {
  const v = document.getElementById('manualBarcode').value.trim();
  if (!v) { showToast('QR kod boş olamaz', true); return; }
  document.getElementById('manualBarcode').value = '';
  openModal(v);
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(barcode) {
  pendingBarcode = barcode;
  document.getElementById('modalBarcode').textContent = barcode;
  document.getElementById('modalDesc').value = '';
  document.getElementById('modalLocation').selectedIndex = 0;

  // Check if device exists — pre-select current location
  const devices = loadDevices();
  const existing = devices.find(d => d.barcode === barcode);
  if (existing) {
    document.getElementById('modalDesc').value = existing.desc || '';
    const sel = document.getElementById('modalLocation');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === existing.location) { sel.selectedIndex = i; break; }
    }
  }

  document.getElementById('locationModal').classList.add('open');
}

function closeModal() {
  document.getElementById('locationModal').classList.remove('open');
  pendingBarcode = null;
}

function saveDevice() {
  if (!pendingBarcode) return;
  const location = document.getElementById('modalLocation').value;
  const desc     = document.getElementById('modalDesc').value.trim();
  const now      = new Date().toISOString();
  const devices  = loadDevices();
  const idx      = devices.findIndex(d => d.barcode === pendingBarcode);
  const histEntry = { location, date: now };

  if (idx >= 0) {
    const prev = devices[idx].location;
    if (prev !== location) {
      devices[idx].history = devices[idx].history || [];
      devices[idx].history.unshift(histEntry);
    }
    devices[idx].location = location;
    devices[idx].updatedAt = now;
    if (desc) devices[idx].desc = desc;
  } else {
    devices.push({
      id:        'gd_' + Date.now(),
      barcode:   pendingBarcode,
      desc,
      location,
      createdAt: now,
      updatedAt: now,
      history:   [histEntry]
    });
  }

  saveDevices(devices);
  closeModal();
  renderStats();
  renderList();
  showToast('✓ Kaydedildi → ' + location);
}

// ── RENDER STATS ──────────────────────────────────────────────────
function renderStats() {
  const devices = loadDevices();
  const total   = devices.length;
  const egemar  = devices.filter(d => d.location === 'EGEMAR CALİBRATION').length;
  const onVessel = total - egemar;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">Toplam</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green);">${onVessel}</div><div class="stat-lbl">Gemilerde</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--gold);">${egemar}</div><div class="stat-lbl">Egemar'da</div></div>
  `;
}

// ── RENDER LIST ───────────────────────────────────────────────────
function renderList() {
  const devices  = loadDevices();
  const locF     = document.getElementById('filterLocation').value;
  const searchF  = (document.getElementById('filterSearch').value || '').toLowerCase();
  const cont     = document.getElementById('deviceList');

  let filtered = devices.filter(d => {
    if (locF    && d.location !== locF) return false;
    if (searchF && !d.barcode.toLowerCase().includes(searchF) && !(d.desc||'').toLowerCase().includes(searchF)) return false;
    return true;
  });

  // Sort: newest first
  filtered.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));

  if (!filtered.length) {
    cont.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Cihaz bulunamadı</div></div>`;
    return;
  }

  cont.innerHTML = filtered.map(d => {
    const isEgemar = d.location === 'EGEMAR CALİBRATION';
    const locClass = isEgemar ? 'loc-egemar' : 'loc-vessel';
    const locLabel = isEgemar ? '⚙ Egemar' : '⚓ ' + d.location;
    const date     = d.updatedAt ? new Date(d.updatedAt).toLocaleDateString('tr-TR') : '';
    const hist     = d.history || [];
    const histHtml = hist.map((h,i) => {
      const prev = hist[i+1];
      return `<div class="history-item">
        ${prev ? `<span style="color:var(--text3);font-size:10px;">${h.location === 'EGEMAR CALİBRATION' ? '⚙' : '⚓'} ${h.location}</span>` : `<span style="color:var(--green);font-size:10px;">✦ İlk kayıt: ${h.location === 'EGEMAR CALİBRATION' ? '⚙' : '⚓'} ${h.location}</span>`}
        <span class="hist-date" style="margin-left:auto;">${new Date(h.date).toLocaleDateString('tr-TR')}</span>
      </div>`;
    }).join('');

    return `<div class="device-item" onclick="toggleHistory('hist_${d.id}', this)">
      <div class="device-header">
        <span class="device-barcode">${escHtml(d.barcode)}</span>
        <span class="device-location ${locClass}">${locLabel}</span>
        <span class="device-date">${date}</span>
      </div>
      ${d.desc ? `<div class="device-desc">${escHtml(d.desc)}</div>` : ''}
      <div style="display:flex;gap:8px;margin-top:8px;" onclick="event.stopPropagation()">
        <button onclick="openModal('${escAttr(d.barcode)}')" style="padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;">📍 Taşı</button>
        <button onclick="deleteDevice('${d.id}')" style="padding:4px 10px;background:transparent;color:var(--red);border:1px solid rgba(220,38,38,.3);border-radius:5px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;">🗑</button>
        ${hist.length > 0 ? `<span style="font-size:11px;color:var(--text3);padding:4px 0;">↓ ${hist.length} hareket</span>` : ''}
      </div>
      <div class="device-history-wrap" id="hist_${d.id}">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px;">Hareket Geçmişi</div>
        ${histHtml || '<div style="font-size:12px;color:var(--text3);">Geçmiş yok</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleHistory(id, row) {
  const wrap = document.getElementById(id);
  if (!wrap) return;
  wrap.classList.toggle('open');
  row.style.borderColor = wrap.classList.contains('open') ? 'var(--accent)' : '';
}

function deleteDevice(id) {
  if (!confirm('Bu cihaz silinsin mi?')) return;
  const devices = loadDevices().filter(d => d.id !== id);
  saveDevices(devices);
  renderStats();
  renderList();
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return (s||'').replace(/'/g,"\\'"); }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.display = 'none'; }, 3500);
}

// Close modal on background click
document.getElementById('locationModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();

// ESC to close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
